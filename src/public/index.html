<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pom da Tera - Gestione Ore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="bg-green-700 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">🍎 Pom da Tera</h1>
        <button id="btnLogout" class="hidden text-sm bg-green-800 px-3 py-1 rounded hover:bg-green-900 transition">Esci</button>
    </nav>

    <div id="authSection" class="max-w-md mx-auto mt-20 p-10 bg-white rounded shadow text-center">
        <h2 class="text-2xl mb-6 font-bold text-green-800">Pom da Tera</h2>
        <p class="mb-6 text-stone-600">Accedi con il tuo account Google per registrare le ore.</p>
        <button id="btnLoginGoogle" class="flex items-center justify-center w-full border p-3 rounded-lg hover:bg-stone-50 transition shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6 mr-3">
            Accedi con Google
        </button>
    </div>

    <div id="mainApp" class="hidden max-w-6xl mx-auto p-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <section class="bg-white p-6 rounded-lg shadow h-fit">
                <h2 class="font-bold mb-4 text-green-700 uppercase text-sm tracking-wider">Nuova Attività</h2>
                <form id="oreForm" class="space-y-4">
                    <select id="attivita" class="w-full border p-2 rounded bg-stone-50">
                        <option>Centro del Riuso</option>
                        <option>Frutteto</option>
                        <option>Panieri</option>
                        <option>Sede</option>
                        <option>Direttivo</option>
                        <option>Gestione Economica</option>
                        <option>Varie</option>
                    </select>
                    <input type="number" id="ore" step="0.5" class="w-full border p-2 rounded" placeholder="Ore (es. 2.5)" required>
                    <div>
                        <label class="text-[10px] text-stone-500 uppercase">Data attività</label>
                        <input type="date" id="dataAttivita" class="w-full border p-2 rounded bg-stone-50" required>
                    </div>
                    <textarea id="descrizione" class="w-full border p-2 rounded" placeholder="Cosa hai fatto?" required></textarea>
                    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">Registra</button>
                </form>
            </section>

            <section class="md:col-span-2 bg-white p-6 rounded-lg shadow overflow-x-auto">
                <h2 class="font-bold mb-4 text-green-700 uppercase text-sm tracking-wider">Riepilogo Ore per Socio</h2>
                <table class="w-full text-xs text-left border-collapse border">
                    <thead>
                        <tr class="bg-stone-100" id="tableHeader">
                            <th class="p-2 border">Socio</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </section>

            <section class="md:col-span-3 bg-white p-6 rounded-lg shadow mt-6">
                <h2 class="font-bold mb-6 border-b pb-2 text-green-800 text-xl text-center md:text-left">Diario di Bordo</h2>
                <div id="listaDettagliata" class="space-y-8"></div>
            </section>

            <section id="adminPanelSection" class="hidden md:col-span-3 bg-red-50 p-6 rounded-lg border-2 border-red-200 mt-6">
                <div id="gestioneNomiContainer" class="hidden mb-6 border-b border-red-200 pb-4">
                    <h3 class="font-bold text-red-800 text-xs uppercase mb-2">Gestione Nomi Soci (Admin)</h3>
                    <div class="flex flex-wrap gap-2">
                        <input type="email" id="adminUserEmail" placeholder="Email socio" class="text-xs p-2 border rounded w-full md:w-48 bg-white">
                        <input type="text" id="adminUserNome" placeholder="Nome reale" class="text-xs p-2 border rounded w-full md:w-48 bg-white">
                        <button onclick="salvaNomeSocio()" class="bg-red-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-red-700">Salva Nome</button>
                    </div>
                </div>
                
                <h2 id="titoloGestioneRecord" class="font-bold mb-4 text-red-800 uppercase text-sm">Caricamento...</h2>
                <div id="adminVoci" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 text-xs"></div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, getDocs, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyC8BXNtmAiAg39eEGXxlaHi0Lbi1yiQsZA",
          authDomain: "apppomdatera.firebaseapp.com",
          projectId: "apppomdatera",
          storageBucket: "apppomdatera.firebasestorage.app",
          messagingSenderId: "989073289331",
          appId: "1:989073289331:web:f69b32d6f92379bcd8fa06",
          measurementId: "G-5ZD9QNK6P0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userEmail = null, userName = "", userPhoto = "", isAdminUser = false, socioSelezionato = null;
        const attivitaList = ["Centro del Riuso", "Frutteto", "Panieri", "Sede", "Direttivo", "Gestione Economica", "Varie"];

        document.getElementById('dataAttivita').valueAsDate = new Date();

        document.getElementById('btnLoginGoogle').onclick = async () => { try { await signInWithPopup(auth, provider); } catch (e) { alert(e.message); } };
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userEmail = user.email; userName = user.displayName; userPhoto = user.photoURL;
                const userDoc = await getDoc(doc(db, "users", userEmail));
                isAdminUser = userDoc.exists() && userDoc.data().admin === true;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('btnLogout').classList.remove('hidden');
                document.getElementById('adminPanelSection').classList.remove('hidden');
                if(isAdminUser) document.getElementById('gestioneNomiContainer').classList.remove('hidden');
                caricaDati();
            } else { document.getElementById('authSection').classList.remove('hidden'); document.getElementById('mainApp').classList.add('hidden'); }
        });

        window.abilitaModifica = (id) => { document.getElementById(`view-${id}`).classList.add('hidden'); document.getElementById(`edit-${id}`).classList.remove('hidden'); };
        window.annullaModifica = (id) => { document.getElementById(`view-${id}`).classList.remove('hidden'); document.getElementById(`edit-${id}`).classList.add('hidden'); };

        window.salvaModifica = async (id) => {
            const d = document.getElementById(`input-data-${id}`).value;
            const a = document.getElementById(`input-att-${id}`).value;
            const o = parseFloat(document.getElementById(`input-ore-${id}`).value);
            try { await setDoc(doc(db, "ore_volontariato", id), { data: new Date(d), attivita: a, ore: o }, { merge: true }); alert("✅ Salvato!"); } catch(e) { alert("Errore!"); }
        };

        window.eliminaRecord = async (id) => { if (confirm("Eliminare?")) await deleteDoc(doc(db, "ore_volontariato", id)); };

        window.salvaNomeSocio = async () => {
            const e = document.getElementById('adminUserEmail').value.trim().toLowerCase();
            const n = document.getElementById('adminUserNome').value.trim();
            if(isAdminUser && e && n) await setDoc(doc(db, "users", e), { nomeReale: n }, { merge: true });
        };

        function caricaDati() {
            onSnapshot(query(collection(db, "ore_volontariato"), orderBy("data", "desc")), async (snapshot) => {
                let mappaNomi = {};
                const usersSnap = await getDocs(collection(db, "users"));
                usersSnap.forEach(u => mappaNomi[u.id] = u.data().nomeReale);

                const datiPerSocio = {}, tutteLeVoci = [];
                snapshot.forEach(doc => {
                    const d = doc.data(); tutteLeVoci.push({id: doc.id, ...d});
                    const nv = mappaNomi[d.socio] || d.socioNome || d.socio.split('@')[0];
                    if (!datiPerSocio[d.socio]) datiPerSocio[d.socio] = { nome: nv, ore: {} };
                    datiPerSocio[d.socio].ore[d.attivita] = (datiPerSocio[d.socio].ore[d.attivita] || 0) + d.ore;
                });

                // Tabella Pivot
                const header = document.getElementById('tableHeader');
                header.innerHTML = `<th class="p-2 border bg-stone-100">Socio</th>` + attivitaList.map(a => `<th class="p-2 border text-center text-[10px]">${a}</th>`).join('') + `<th class="p-2 border font-bold text-center">TOT</th>`;
                const tbody = document.getElementById('tableBody'); tbody.innerHTML = "";
                Object.keys(datiPerSocio).sort().forEach(s => {
                    let r = `<td class="p-2 border font-bold text-blue-700 cursor-pointer hover:bg-blue-50" onclick="window.selezionaSocio('${s}')">👤 ${datiPerSocio[s].nome}</td>`;
                    let t = 0; attivitaList.forEach(a => { const o = datiPerSocio[s].ore[a] || 0; r += `<td class="p-2 border text-center ${o>0?'bg-green-50':''}">${o||'-'}</td>`; t += o; });
                    r += `<td class="p-2 border font-bold text-center">${t}</td>`;
                    tbody.innerHTML += `<tr>${r}</tr>`;
                });

                window.selezionaSocio = (email) => { 
                    socioSelezionato = email; 
                    if(isAdminUser) { document.getElementById('adminUserEmail').value = email; document.getElementById('adminUserNome').value = mappaNomi[email] || ""; }
                    renderUI(); 
                };

                const renderUI = () => {
                    // 1. RENDERING DIARIO DI BORDO (Dettagli socio cliccato)
                    const listaDiv = document.getElementById('listaDettagliata');
                    if (!socioSelezionato) {
                        listaDiv.innerHTML = `<p class="italic text-stone-400">Seleziona un socio dalla tabella.</p>`;
                    } else {
                        const filtrate = tutteLeVoci.filter(v => v.socio === socioSelezionato);
                        const n = mappaNomi[socioSelezionato] || filtrate[0]?.socioNome || socioSelezionato.split('@')[0];
                        listaDiv.innerHTML = `<h3 class="text-xl font-bold text-green-800 mb-4">Dettagli: ${n}</h3>`;
                        attivitaList.forEach(at => {
                            const perAt = filtrate.filter(v => v.attivita === at);
                            if (perAt.length > 0) {
                                let h = `<div class="bg-white p-3 rounded border-l-4 border-green-600 mb-2 shadow-sm"><h4 class="font-bold text-green-700 text-sm">${at}</h4><table class="w-full text-xs mt-1">`;
                                perAt.forEach(v => {
                                    const d = v.data?.seconds ? new Date(v.data.seconds*1000).toLocaleDateString('it-IT') : v.data;
                                    h += `<tr class="border-t"><td class="py-1 w-20 text-stone-500">${d}</td><td class="w-10 font-bold">${v.ore}h</td><td class="italic text-stone-600">${v.descrizione}</td></tr>`;
                                });
                                listaDiv.innerHTML += h + `</table></div>`;
                            }
                        });
                    }

                    // 2. RENDERING GESTIONE RECORD (Rossa)
                    const adminDiv = document.getElementById('adminVoci');
                    const tGest = document.getElementById('titoloGestioneRecord');
                    let target = isAdminUser ? socioSelezionato : userEmail;

                    if (!target) {
                        adminDiv.innerHTML = `<p class="italic text-red-400">Seleziona un socio per modificare i record.</p>`;
                        tGest.innerText = "Gestione Record";
                    } else {
                        const recs = tutteLeVoci.filter(v => v.socio === target);
                        tGest.innerText = isAdminUser ? `Gestione record di: ${mappaNomi[target] || target}` : "I tuoi record";
                        adminDiv.innerHTML = recs.map(v => {
                            const iso = v.data?.seconds ? new Date(v.data.seconds*1000).toISOString().split('T')[0] : v.data;
                            const dsp = v.data?.seconds ? new Date(v.data.seconds*1000).toLocaleDateString('it-IT') : v.data;
                            return `
                            <div class="bg-white border rounded mb-2 overflow-hidden shadow-sm">
                                <div id="view-${v.id}" class="p-2 flex justify-between items-center">
                                    <div><b>${dsp}</b> - ${v.attivita} (${v.ore}h)</div>
                                    <div class="flex gap-2 text-blue-600 font-bold"><button onclick="window.abilitaModifica('${v.id}')">Edit</button><button onclick="window.eliminaRecord('${v.id}')" class="text-red-600">X</button></div>
                                </div>
                                <div id="edit-${v.id}" class="hidden p-2 bg-blue-50 space-y-1">
                                    <input type="date" id="input-data-${v.id}" value="${iso}" class="w-full p-1 border rounded">
                                    <select id="input-att-${v.id}" class="w-full p-1 border rounded">${attivitaList.map(a=>`<option ${a===v.attivita?'selected':''}>${a}</option>`).join('')}</select>
                                    <input type="number" step="0.5" id="input-ore-${v.id}" value="${v.ore}" class="w-full p-1 border rounded">
                                    <div class="flex gap-1"><button onclick="window.salvaModifica('${v.id}')" class="flex-1 bg-green-600 text-white rounded p-1 font-bold">Salva</button><button onclick="window.annullaModifica('${v.id}')" class="flex-1 bg-stone-400 text-white rounded p-1 font-bold">Annulla</button></div>
                                </div>
                            </div>`;
                        }).join('');
                    }
                };
                renderUI();
            });
        }

        document.getElementById('oreForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "ore_volontariato"), {
                attivita: document.getElementById('attivita').value, ore: parseFloat(document.getElementById('ore').value),
                descrizione: document.getElementById('descrizione').value, data: new Date(document.getElementById('dataAttivita').value),
                socio: userEmail, socioNome: userName, socioFoto: userPhoto
            });
            e.target.reset(); document.getElementById('dataAttivita').valueAsDate = new Date(); alert("✅ OK!");
        };
    </script>
</body>
</html>
